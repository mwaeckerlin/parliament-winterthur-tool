services:
  # Dev-/Test-Stack fuer parlwin.
  #
  # Die drei parlwin-Images sind als Tags eines einzigen Docker-Hub-Repos
  # gedacht (mwaeckerlin/parliament-winterthur-tool:php-fpm,
  # mwaeckerlin/parliament-winterthur-tool:nginx,
  # mwaeckerlin/parliament-winterthur-tool:realtime).  Jedes hat genau ein Dockerfile
  # und keine `target:`-Aufteilung, damit die Auto-Builds funktionieren.
  # Lokal wird hier zusaetzlich `build:` angegeben, damit
  # `docker compose up --build` aus dem Source-Tree baut.
  #
  # Fuer ein reines Deployment ohne lokalen Build siehe `example/`.

  nextcloud-nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: mwaeckerlin/parliament-winterthur-tool:nginx
    environment:
      WEBROOT: ${WEBROOT:-}
    ports:
      - "${NEXTCLOUD_HTTP_PORT:-29824}:8080"
    volumes:
      - apps:/app/custom_apps:ro
    depends_on:
      nextcloud-php-fpm:
        condition: service_started
    networks:
      - nginx-php
      - nginx-collabora
      - nginx-realtime

  nextcloud-php-fpm:
    build:
      context: .
      dockerfile: Dockerfile.php-fpm
    image: mwaeckerlin/parliament-winterthur-tool:php-fpm
    environment:
      HOST: ${HOST:-localhost:${NEXTCLOUD_HTTP_PORT:-29824}}
      PROTOCOL: ${PROTOCOL:-http}
      WEBROOT: ${WEBROOT:-}
      MYSQL_HOST: nextcloud-db
      MYSQL_USER: nextcloud
      MYSQL_DATABASE: nextcloud
      PARLWIN_REALTIME_WS_URL: ${PARLWIN_REALTIME_WS_URL:-}
      PARLWIN_REALTIME_PUBLISH_URL: ${PARLWIN_REALTIME_PUBLISH_URL:-http://parlwin-realtime:3001/publish}
      PARLWIN_REALTIME_SECRET: ${PARLWIN_REALTIME_SECRET:-}
      PARLWIN_SYNC_LIMIT_ALL: ${PARLWIN_SYNC_LIMIT_ALL:-}
      PARLWIN_SYNC_LIMIT_GESCHAEFTE: ${PARLWIN_SYNC_LIMIT_GESCHAEFTE:-}
      PARLWIN_SYNC_LIMIT_SITZUNGEN: ${PARLWIN_SYNC_LIMIT_SITZUNGEN:-}
      PARLWIN_SYNC_LIMIT_MITGLIEDER: ${PARLWIN_SYNC_LIMIT_MITGLIEDER:-}
      PARLWIN_SYNC_LIMIT_KOMMISSIONEN: ${PARLWIN_SYNC_LIMIT_KOMMISSIONEN:-}
      PARLWIN_SYNC_LIMIT_FRAKTIONEN: ${PARLWIN_SYNC_LIMIT_FRAKTIONEN:-}
    secrets:
      - nextcloud_db_password
      - nextcloud_admin_password
    volumes:
      - data:/app/data
      - config:/app/config
      - apps:/app/custom_apps
    depends_on:
      nextcloud-db:
        condition: service_started
      collabora:
        condition: service_started
    networks:
      - nginx-php
      - php-db
      - php-smtp
      - php-collabora
      - php-realtime

  parlwin-realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    image: mwaeckerlin/parliament-winterthur-tool:realtime
    environment:
      PORT: 3001
      PARLWIN_REALTIME_AUTH_REQUIRED: ${PARLWIN_REALTIME_AUTH_REQUIRED:-1}
      PARLWIN_NEXTCLOUD_BASE_URL: ${PARLWIN_NEXTCLOUD_BASE_URL:-http://nextcloud-nginx:8080}
      PARLWIN_NEXTCLOUD_AUTH_URL: ${PARLWIN_NEXTCLOUD_AUTH_URL:-}
      PARLWIN_REALTIME_SECRET: ${PARLWIN_REALTIME_SECRET:-}
    networks:
      php-realtime:
      nginx-realtime:
        aliases:
          - parlwin-ws

  smtp-relay:
    image: mwaeckerlin/fake-smtp
    volumes:
      - mails:/mails
    networks:
      - php-smtp

  collabora:
    image: collabora/code
    environment:
      server_name: ${HOST:-localhost:${NEXTCLOUD_HTTP_PORT:-29824}}
      domain: nextcloud-nginx|localhost
      aliasgroup1: http://nextcloud-nginx:8080,http://localhost:${NEXTCLOUD_HTTP_PORT:-29824}
      extra_params: --o:ssl.enable=false --o:ssl.termination=false
    cap_add:
      - MKNOD
    networks:
      - nginx-collabora
      - php-collabora

  nextcloud-db:
    image: mariadb
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD_FILE: /run/secrets/nextcloud_db_password
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    secrets:
      - nextcloud_db_password
    volumes:
      - db:/var/lib/mysql
    networks:
      - php-db

  access-fix:
    image: mwaeckerlin/allow-write-access
    network_mode: none
    volumes:
      - data:/app/data
      - config:/app/config
      - apps:/app/custom_apps

secrets:
  nextcloud_db_password:
    environment: NEXTCLOUD_DB_PASSWORD
  nextcloud_admin_password:
    environment: NEXTCLOUD_ADMIN_PASSWORD

volumes:
  data:
  config:
  apps:
  db:
  mails:

networks:
  nginx-php:
    driver_opts:
      encrypted: 1
  php-db:
    driver_opts:
      encrypted: 1
  php-smtp:
    driver_opts:
      encrypted: 1
  nginx-collabora:
    driver_opts:
      encrypted: 1
  php-collabora:
    driver_opts:
      encrypted: 1
  php-realtime:
    driver_opts:
      encrypted: 1
  nginx-realtime:
    driver_opts:
      encrypted: 1
