services:
  # Production deployment for parlwin.
  #
  # Mirrors mwaeckerlin/nextcloud → example/docker-compose.yml: same volumes,
  # same networks, same traefik front. Differences:
  #   * nextcloud-php-fpm uses mwaeckerlin/parliament-winterthur-tool:php-fpm
  #     (seeds the app)
  #   * an extra service mwaeckerlin/parliament-winterthur-tool:realtime provides the
  #     realtime backend
  #     reachable through the generic /ws/<appid>/ proxy of nextcloud-nginx
  #
  # Required configuration in .env: HOST, LETSENCRYPT_EMAIL,
  # NEXTCLOUD_DB_PASSWORD, NEXTCLOUD_ADMIN_PASSWORD. Everything else has
  # sensible defaults baked into the images.

  traefik:
    image: traefik
    command:
      - --providers.docker=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.web.http.redirections.entrypoint.permanent=true
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=DEBUG
      - --log.format=json
      - --accesslog=true
      - --accesslog.format=json
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - traefik-nginx
    restart: unless-stopped

  nextcloud-nginx:
    image: mwaeckerlin/nextcloud:nginx
    environment:
      WEBROOT:
    volumes:
      - apps:/app/custom_apps:ro
    depends_on:
      nextcloud-php-fpm:
        condition: service_started
    networks:
      - php-network
      - collabora-network
      - realtime-network
      - traefik-nginx

  nextcloud-php-fpm:
    image: mwaeckerlin/parliament-winterthur-tool:php-fpm
    environment:
      HOST: ${HOST}
      PROTOCOL: ${PROTOCOL:-https}
      WEBROOT: ${WEBROOT}
      MYSQL_HOST: nextcloud-db
      MYSQL_USER: nextcloud
      MYSQL_DATABASE: nextcloud
    secrets:
      - nextcloud_db_password
      - nextcloud_admin_password
    volumes:
      - data:/app/data
      - config:/app/config
      - apps:/app/custom_apps
    depends_on:
      nextcloud-db:
        condition: service_started
      collabora:
        condition: service_started
    networks:
      - php-network
      - db-network
      - smtp-network
      - collabora-network
      - realtime-network

  # Realtime broadcaster for parlwin. Reached by browsers through the
  # generic /ws/<appid>/ reverse-proxy in mwaeckerlin/nextcloud:nginx
  # (same-origin, no CSP / certificate work needed).
  parlwin-realtime:
    image: mwaeckerlin/parliament-winterthur-tool:realtime
    networks:
      - realtime-network

  smtp-relay:
    image: mwaeckerlin/smtp-relay
    networks:
      - smtp-network

  collabora:
    image: collabora/code
    environment:
      server_name: ${HOST}
      domain: nextcloud-nginx|${HOST}|www.${HOST}
      aliasgroup1: http://nextcloud-nginx:8080,https://${HOST},https://www.${HOST}
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
    cap_add:
      - MKNOD
    networks:
      collabora-network:
        aliases:
          - ${HOST}
      traefik-nginx:

  nextcloud-db:
    image: mariadb
    environment:
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD_FILE: /run/secrets/nextcloud_db_password
      MYSQL_RANDOM_ROOT_PASSWORD: yes
    secrets:
      - nextcloud_db_password
    volumes:
      - db:/var/lib/mysql
    networks:
      - db-network

  access-fix:
    image: mwaeckerlin/allow-write-access
    volumes:
      - data:/app/data
      - config:/app/config
      - apps:/app/custom_apps

secrets:
  nextcloud_db_password:
    environment: NEXTCLOUD_DB_PASSWORD
  nextcloud_admin_password:
    environment: NEXTCLOUD_ADMIN_PASSWORD

volumes:
  traefik-letsencrypt:
  data:
  config:
  apps:
  db:

networks:
  traefik-nginx:
    driver_opts:
      encrypted: 1
  php-network:
    driver_opts:
      encrypted: 1
  db-network:
    driver_opts:
      encrypted: 1
  smtp-network:
    driver_opts:
      encrypted: 1
  collabora-network:
    driver_opts:
      encrypted: 1
  realtime-network:
    driver_opts:
      encrypted: 1
