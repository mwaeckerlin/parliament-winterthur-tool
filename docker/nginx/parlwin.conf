# parlwin Realtime-WebSocket: same-origin Reverse-Proxy auf den internen
# parlwin-realtime-Container.  Wird per Drop-in in /etc/nginx/locations.d/default.conf
# eingebunden, der Server-Block der Basis (mwaeckerlin/nextcloud:nginx)
# includet diese Datei automatisch.
location ^~ /parlwin/ws {
  proxy_pass http://parlwin-realtime:3001/ws;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $http_host;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_read_timeout 36000s;
  proxy_send_timeout 36000s;
}
