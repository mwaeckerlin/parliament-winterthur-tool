server {
  listen 8080 default_server;
  listen [::]:8080 default_server;
  error_page 500 /502.html;
  error_page 502 /502.html;
  error_page 504 /504.html;
  error_page 404 /404.html;
  error_page 403 /404.html;

  location ~ ^/(502|504|404)\.html {
    internal;
    root /etc/nginx/error/$lang;
  }

  location ~ ^/(502|504|404)\.jpg {
    root /etc/nginx/error;
  }

  root ${ROOT};
  index index.php index.html /index.php$uri$is_args$args;
  set $webroot "${WEBROOT}";
  fastcgi_param modHeadersAvailable true;
  fastcgi_param front_controller_active true;

  # Support serving Nextcloud below a URL prefix such as /nextcloud.
  # Requests keep their public URL, but NGINX strips the prefix internally
  # so the existing root-based Nextcloud layout keeps working unchanged.
  if ($webroot != "") {
    rewrite ^/$ $scheme://$http_host$webroot/ redirect;
    rewrite ^${WEBROOT}$ $scheme://$http_host${WEBROOT}/ permanent;
    rewrite ^${WEBROOT}/(.*)$ /$1 last;
  }

  # CalDAV / CardDAV auto-redirect
  location ^~ /.well-known {
    location = /.well-known/carddav { return 301 $scheme://$http_host${WEBROOT}/remote.php/dav/; }
    location = /.well-known/caldav  { return 301 $scheme://$http_host${WEBROOT}/remote.php/dav/; }
    location /.well-known/acme-challenge  { try_files $uri $uri/ =404; }
    location /.well-known/pki-validation { try_files $uri $uri/ =404; }
    return 301 ${WEBROOT}/index.php$uri$is_args$args;
  }

  # Block sensitive directories
  location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/) {
    return 404;
  }
  location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console) {
    return 404;
  }

  # Compatibility shim for legacy files_versions sidebar asset references.
  # Returning CSS avoids browser content-corruption errors on stale URLs.
  location = /apps/files_versions/css/sidebar-tab.css {
    default_type text/css;
    return 200 "/* compatibility shim */\n";
  }

  # Custom app assets are installed under /app/custom_apps, but some app URLs use /apps/<id>/...
  location ~ ^/apps/([^/]+)/(.+\.(?:css|js|mjs|map|svg|gif|png|jpg|ico|otf|woff2?))$ {
    try_files /custom_apps/$1/$2 $uri /index.php$uri$is_args$args;
    expires 6M;
    access_log off;
  }

  # Reverse proxy Collabora on the same origin as Nextcloud.
  # This avoids cross-port browser restrictions and keeps WOPI traffic inside Docker.
  location ^~ /browser {
    proxy_pass http://collabora:9980;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ^~ /cool {
    proxy_pass http://collabora:9980;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 36000s;
  }

  location ^~ /hosting {
    proxy_pass http://collabora:9980;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ^~ /lool {
    proxy_pass http://collabora:9980;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 36000s;
  }

  # parlwin Realtime-WebSocket: same-origin reverse-proxy auf den internen
  # realtime-server-Container. Vermeidet Cross-Port-CSP-Probleme, kein extra
  # Port nach aussen noetig.
  location ^~ /parlwin/ws {
    proxy_pass http://parlwin-realtime:3001/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 36000s;
    proxy_send_timeout 36000s;
  }

  # Nextcloud needs the public script name to include the configured webroot,
  # while the physical script path must still point into /app.
  # The generic PHP location from the base nginx image loses PATH_INFO for
  # routes such as /index.php/apps/... and exposes /index.php instead of the
  # public /<webroot>/index.php script name.
  location ~* \.php(?:$|/) {
    root ${ROOT};
    include         fastcgi_params;
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    set $path_info $fastcgi_path_info;
    try_files $fastcgi_script_name =404;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME ${WEBROOT}$fastcgi_script_name;
    fastcgi_param DOCUMENT_URI ${WEBROOT}$document_uri;
    fastcgi_param PATH_INFO $path_info;
    fastcgi_param HTTPS on;
    resolver 127.0.0.11:53 valid=30s;
    fastcgi_read_timeout 36000s;
    fastcgi_pass ${PHP_FPM_HOST}:${PHP_FPM_PORT};
    fastcgi_intercept_errors off;
    fastcgi_request_buffering off;
  }

  include /etc/nginx/locations.d/default.conf;
}
